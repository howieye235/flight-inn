<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlightInn | Aviation Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-arc@1.0.0/bin/leaflet-arc.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="editor-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000;">
    <div style="background:#1a1a1a; color:white; width:350px; margin:100px auto; padding:20px; border-radius:10px; border:1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
        <h3 id="modal-title">Add New Entry ✈️</h3>
        
        <label style="font-size: 12px; color: #888;">Category</label>
       <select id="entry-category" style="width:100%; margin-bottom:15px; padding:8px;">
    <option value="Airlines">Airline</option>
    <option value="Fleets">Fleet</option>
    <option value="Airports">Airport</option>
    <option value="Routes">Route (Map Path)</option>
</select>

        <label style="font-size: 12px; color: #888;">Name</label>
        <input type="text" id="entry-name" placeholder="e.g. L-1011 or Heathrow" style="width:94%; margin-bottom:15px; padding:8px;">
        
        <label style="font-size: 12px; color: #888;">Details</label>
        <textarea id="entry-info" placeholder="Technical specs or history..." style="width:94%; height:100px; margin-bottom:15px; padding:8px;"></textarea>
        
        <div style="display:flex; justify-content:space-between;">
            <button onclick="saveEntry()" style="background:#2ecc71; color:white; border:none; padding:10px 20px; cursor:pointer; border-radius:4px;">Save to Cloud</button>
            <button onclick="closeEditor()" style="background:#e74c3c; color:white; border:none; padding:10px; cursor:pointer; border-radius:4px;">Cancel</button>
        </div>
    </div>
</div>
    
    <div id="sidebar">
        <h1 onclick="renderHome()">✈️ FlightInn</h1>
        <div class="nav-group">
            <div class="nav-link" onclick="loadDirectory('Airlines')">AIRLINES</div>
            <div class="nav-link" onclick="loadDirectory('Fleets')">FLEETS</div>
            <div class="nav-link" onclick="loadDirectory('Airports')">AIRPORTS</div>
            <div class="nav-link" onclick="loadDirectory('Routes')">ROUTES</div>
        </div>
        <button id="editTrigger" onclick="openEditor()">+ Edit</button>
    </div>

    <main id="main-display">
        <div id="top-bar">
            <input type="text" id="queryInput" placeholder="Quick Search (e.g. MD-11, WestJet...)" onkeyup="runQuery()">
        </div>

        <div id="view-port">
            </div>

        <div id="wiki-editor" style="display:none;">
            <div class="editor-header">
                <h3>Source Code Editor</h3>
                <button onclick="toggleEditor()">Close</button>
            </div>
            <textarea id="jsonBox" spellcheck="false"></textarea>
            <div style="margin-top:10px;">
                <button class="save-btn" onclick="applyData()">Save & Sync</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
