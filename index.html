<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightInn | Aviation OS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/jseppi/Leaflet.Arc@master/Leaflet.Arc.min.js"></script>

    <script>
        (function(){L.Polyline.Arc=function(a,b,c){c=c||{};var d=c.vertices||100;var f=L.latLng(a),g=L.latLng(b);var h=Math.PI/180;var i=f.lng*h,j=f.lat*h,k=g.lng*h,l=g.lat*h;var m=[],n=Math.acos(Math.sin(j)*Math.sin(l)+Math.cos(j)*Math.cos(l)*Math.cos(k-i));for(var o=0;o<=d;o++){var p=o/d;var q=Math.sin((1-p)*n)/Math.sin(n),r=Math.sin(p*n)/Math.sin(n);var s=q*Math.cos(j)*Math.cos(i)+r*Math.cos(l)*Math.cos(k);var t=q*Math.cos(j)*Math.sin(i)+r*Math.cos(l)*Math.sin(k);var u=q*Math.sin(j)+r*Math.sin(l);var v=Math.atan2(u,Math.sqrt(Math.pow(s,2)+Math.pow(t,2)));var w=Math.atan2(t,s);m.push([v/h,w/h])}return L.polyline(m,c)}})();
    </script>

    <script src="script.js"></script>
<body>

    <div id="sidebar">
        <h1 onclick="renderHome()">✈️ FlightInn</h1>
        <div class="nav-item" onclick="loadDirectory('Airlines')">Airlines</div>
        <div class="nav-item" onclick="loadDirectory('Fleets')">Fleets</div>
        <div class="nav-item" onclick="loadDirectory('Airports')">Airports</div>
        <div class="nav-item" onclick="loadDirectory('Routes')">Routes</div>
        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
        <button id="add-btn" onclick="openEditor()">+ ADD NEW</button>
    </div>

<div id="main-display" style="flex: 1; display: flex; flex-direction: column;">
    
    <div id="top-bar" style="padding: 20px; background: white; border-bottom: 1px solid #e2e8f0;">
        <input type="text" id="queryInput" onkeyup="searchDatabase()" placeholder="Search Fleets, Airlines, or Routes..." style="width: 100%; max-width: 500px; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
    </div>

    <div id="view-port" style="flex: 1; padding: 40px; overflow-y: auto;">
        </div>

</div>

    <div id="editor-modal" class="modal">
        <div class="modal-content">
            <h3>Log Asset</h3>
            <label>Category</label>
            <select id="entry-category">
                <option value="Airlines">Airline</option>
                <option value="Fleets">Fleet/Aircraft</option>
                <option value="Airports">Airport</option>
                <option value="Routes">Route (Map)</option>
            </select>
            <label>Name</label>
            <input type="text" id="entry-name" placeholder="e.g. Boeing 747SP">
            <label>Image URL</label>
            <input type="text" id="entry-image" placeholder="Paste image link...">
            <label>Details</label>
            <textarea id="entry-info" placeholder="Specs or Route (Info | Lat,Lng | Lat,Lng)"></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="saveEntry()" class="save-btn">Save to Cloud</button>
                <button onclick="closeEditor()" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

</body>
</html>
