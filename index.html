<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlightInn | Aviation Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <div id="editor-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000;">
    <div style="background:#1a1a1a; color:white; width:300px; margin:100px auto; padding:20px; border-radius:10px; border:1px solid #333;">
        <h3>Add New Aircraft ✈️</h3>
        <input type="text" id="plane-name" placeholder="Name (e.g. 747SP)" style="width:90%; margin-bottom:10px; padding:8px;">
        <textarea id="plane-info" placeholder="Details..." style="width:90%; height:100px; margin-bottom:10px; padding:8px;"></textarea>
        
        <div style="display:flex; justify-content:space-between;">
            <button onclick="saveNewPlane()" style="background:#2ecc71; color:white; border:none; padding:10px; cursor:pointer;">Save to Cloud</button>
            <button onclick="closeEditor()" style="background:#e74c3c; color:white; border:none; padding:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-arc@1.0.0/bin/leaflet-arc.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <h1 onclick="renderHome()">✈️ FlightInn</h1>
        <div class="nav-group">
            <div class="nav-link" onclick="loadDirectory('Airlines')">AIRLINES</div>
            <div class="nav-link" onclick="loadDirectory('Fleets')">FLEETS</div>
            <div class="nav-link" onclick="loadDirectory('Airports')">AIRPORTS</div>
            <div class="nav-link" onclick="loadDirectory('Routes')">ROUTES</div>
        </div>
        <button id="editTrigger" onclick="toggleEditor()">[ Edit Database ]</button>
    </div>

    <main id="main-display">
        <div id="top-bar">
            <input type="text" id="queryInput" placeholder="Quick Search (e.g. MD-11, WestJet...)" onkeyup="runQuery()">
        </div>

        <div id="view-port">
            </div>

        <div id="wiki-editor" style="display:none;">
            <div class="editor-header">
                <h3>Source Code Editor</h3>
                <button onclick="toggleEditor()">Close</button>
            </div>
            <textarea id="jsonBox" spellcheck="false"></textarea>
            <div style="margin-top:10px;">
                <button class="save-btn" onclick="applyData()">Save & Sync</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
