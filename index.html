<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightInn | Aviation OS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="sidebar">
        <h1 onclick="renderHome()">✈️ FlightInn</h1>
        <div class="nav-item" onclick="loadDirectory('Airlines')">Airlines</div>
        <div class="nav-item" onclick="loadDirectory('Fleets')">Fleets</div>
        <div class="nav-item" onclick="loadDirectory('Airports')">Airports</div>
        <div class="nav-item" onclick="loadDirectory('Routes')">Routes</div>
        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
        <button id="add-btn" onclick="openEditor()">+ ADD NEW</button>
    </div>

    <div id="view-port">
        </div>

    <div id="editor-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Log Asset</h3>
            <label>Category</label>
            <select id="entry-category">
                <option value="Airlines">Airline</option>
                <option value="Fleets">Fleet/Aircraft</option>
                <option value="Airports">Airport</option>
                <option value="Routes">Route (Map)</option>
            </select>
            <label>Name</label>
            <input type="text" id="entry-name" placeholder="e.g. Boeing 747SP">
            <label>Image URL</label>
            <input type="text" id="entry-image" placeholder="Paste link to your photo...">
            <label>Details / Description</label>
            <textarea id="entry-info" placeholder="Specs... (Routes: Info | Lat,Lng | Lat,Lng)"></textarea>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="saveEntry()" class="save-btn">Save to Cloud</button>
                <button onclick="closeEditor()" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
