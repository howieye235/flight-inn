<!DOCTYPE html>
<html>
<head>
    <title>FlightInn | Database</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="sidebar">
        <h1 onclick="renderHome()">✈️ FlightInn</h1>
        <div class="nav-item" onclick="loadDirectory('Airlines')">Airlines</div>
        <div class="nav-item" onclick="loadDirectory('Fleets')">Fleets</div>
        <div class="nav-item" onclick="loadDirectory('Airports')">Airports</div>
        <div class="nav-item" onclick="loadDirectory('Routes')">Routes</div>
        <button id="add-btn" onclick="openEditor()">+ ADD NEW</button>
    </div>

    <div id="view-port">
        </div>

    <div id="editor-modal" class="modal">
        <div class="modal-content">
            <h3>Log Asset</h3>
            <select id="entry-category">
                <option value="Airlines">Airlines</option>
                <option value="Fleets">Fleets</option>
                <option value="Airports">Airports</option>
                <option value="Routes">Routes</option>
            </select>
            <input type="text" id="entry-name" placeholder="Name">
            <input type="text" id="entry-image" placeholder="Image URL (Link to your photo)">
            <textarea id="entry-info" placeholder="Details... (Routes: Info | Lat,Lng | Lat,Lng)"></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="saveEntry()" style="background:#0066cc; color:white; flex:1;">Save</button>
                <button onclick="closeEditor()" style="background:#333; color:white; flex:1;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
